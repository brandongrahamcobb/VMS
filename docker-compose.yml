services:

  db:
    image: postgres
    restart: always
    env_file:
      - .env
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:Z
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}'"]
      interval: 10s
      timeout: 3s
      retries: 3

  vms:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - vms-backups:/app/backups
    healthcheck:
      test: "healthcheck.sh || kill 1"
      interval: 10s
      retries: 3
